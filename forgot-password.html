<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Forgot Password</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #003366 0%, #0D9488 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .logo { text-align: center; margin-bottom: 8px; }
    .logo h1 { font-size: 32px; color: #003366; font-weight: 800; }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: #003366;
      margin-bottom: 6px;
      margin-top: 24px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #6C757D;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #212529;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #DEE2E6;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      color: #212529;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #0D9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #0D9488;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .submit-btn:hover { background: #0F766E; }
    .submit-btn:disabled { background: #6C757D; cursor: not-allowed; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #0D9488;
      text-decoration: none;
      font-weight: 500;
    }

    .back-link:hover { text-decoration: underline; color: #0F766E; }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }

    .message.success { background: #D4EDDA; color: #155724; }
    .message.error   { background: #F8D7DA; color: #721C24; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>ThriveHQ</h1>
    </div>

    <p class="page-title">Forgot your password?</p>
    <p class="page-subtitle">Enter your email address and we'll send you a link to reset your password.</p>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
      <div id="message" class="message"></div>
    </form>

    <a href="index.html" class="back-link">← Back to Sign In</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.style.display = 'block';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');

      // Reset message
      msg.style.display = 'none';
      msg.textContent = '';

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const sb = window.getSupabase();
        if (!sb) throw new Error('Service unavailable. Please refresh the page.');

        const { error } = await sb.auth.resetPasswordForEmail(
          document.getElementById('email').value.trim(),
          { redirectTo: window.location.origin + '/index.html' }
        );

        if (error) throw error;

        showMessage('Reset link sent! Check your email inbox.', 'success');
        document.getElementById('forgotForm').reset();
      } catch (err) {
        showMessage(err.message || 'Error sending reset link. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
