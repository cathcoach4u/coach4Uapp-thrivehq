<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Forgot Password</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="https://cathcoach4u.github.io/coach4u-shared/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #003366 0%, #0D9488 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .logo { text-align: center; margin-bottom: 8px; }
    .logo h1 { font-size: 32px; color: var(--primary); font-weight: 800; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 6px; margin-top: 24px; }
    .page-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
    .submit-btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    .submit-btn:hover { background: var(--accent-dark); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .back-link:hover { text-decoration: underline; color: var(--accent-dark); }
    .message { margin-top: 16px; padding: 12px 14px; border-radius: 6px; font-size: 14px; display: none; }
    .message.success { background: #D4EDDA; color: #155724; }
    .message.error { background: #F8D7DA; color: #721C24; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><h1>ThriveHQ</h1></div>
    <p class="page-title">Forgot your password?</p>
    <p class="page-subtitle">Enter your email and we'll send you a link to set a new password.</p>
    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
      <div id="message" class="message"></div>
    </form>
    <a href="index.html" class="back-link">← Back to Sign In</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const basePath = window.location.href.replace('forgot-password.html', '');
    const resetRedirect = basePath + 'reset-password.html';

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.style.display = 'block';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      msg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const { error } = await sb.auth.resetPasswordForEmail(
          document.getElementById('email').value.trim(),
          { redirectTo: resetRedirect }
        );
        if (error) throw error;
        showMessage('Reset link sent! Check your email inbox.', 'success');
        document.getElementById('forgotForm').reset();
      } catch (err) {
        showMessage(err.message || 'Error sending reset link. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
