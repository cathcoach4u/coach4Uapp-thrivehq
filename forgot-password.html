<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Forgot Password</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo"><h1>ThriveHQ</h1></div>
    <p class="login-title">Forgot your password?</p>
    <p class="login-subtitle">Enter your email and we'll send you a link to set a new password.</p>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div id="message" class="login-message"></div>
      <button type="submit" class="login-btn" id="submitBtn">Send Reset Link</button>
    </form>

    <a href="index.html" class="login-forgot">← Back to Sign In</a>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const basePath = window.location.href.replace('forgot-password.html', '');
    const resetRedirect = basePath + 'reset-password.html';

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'login-message ' + type;
      msg.style.display = 'block';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      document.getElementById('message').style.display = 'none';

      try {
        const { error } = await sb.auth.resetPasswordForEmail(
          document.getElementById('email').value.trim(),
          { redirectTo: resetRedirect }
        );
        if (error) throw error;
        showMessage('Reset link sent. Check your email inbox.', 'success');
        document.getElementById('forgotForm').reset();
      } catch (err) {
        showMessage(err.message || 'Error sending reset link. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
