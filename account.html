<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Account</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="dashboard.html" class="back-link">← Back</a>
        <h1 class="brand-name">Account</h1>
        <button class="sign-out-btn" onclick="window.signOut()">Sign Out</button>
      </div>
    </div>
  </header>
  <main class="main-content">
    <div id="loading" class="loading">Loading account...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="content" style="display:none;">
      <section class="account-section">
        <h2 class="section-title">Profile</h2>
        <div class="info-card">
          <div class="info-row"><span class="label">Email</span><span class="value" id="userEmail">—</span></div>
          <div class="info-row"><span class="label">Name</span><span class="value" id="userName">—</span></div>
        </div>
      </section>
      <section class="account-section">
        <h2 class="section-title">Membership</h2>
        <div class="info-card">
          <div class="info-row"><span class="label">Status</span><span class="value" id="membershipStatus">—</span></div>
          <div class="info-row"><span class="label">Starts</span><span class="value" id="startDate">—</span></div>
          <div class="info-row"><span class="label">Expires</span><span class="value" id="endDate">—</span></div>
        </div>
      </section>
      <section class="account-section">
        <h2 class="section-title">Support</h2>
        <p class="help-text">Need help? Reach out to the ThriveHQ team at <a href="mailto:support@coach4u.com.au">support@coach4u.com.au</a></p>
      </section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    window.addEventListener('DOMContentLoaded', async () => {
      const user = await getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }
      const sb = window.getSupabase();
      const { data: ud } = await sb.from('users').select('membership_status').eq('id', user.id).single();
      if (ud?.membership_status !== 'active') {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Your membership has expired.';
        return;
      }
      try { await loadAccount(); } catch(e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading account.';
      }
    });
  </script>
</body>
</html>
