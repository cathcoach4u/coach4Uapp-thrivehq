<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Body Doubling</title>
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23003366' width='100' height='100'/><text x='50' y='65' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>T</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/info.css">
  <style>
    .link-card {
      display: flex; align-items: center; gap: 14px;
      background: #fff; border-radius: 10px;
      padding: 16px 18px; margin-bottom: 10px;
      text-decoration: none; color: var(--primary);
      border: 2px solid var(--accent);
      box-shadow: 0 2px 8px rgba(13,148,136,0.12);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .link-card:hover {
      box-shadow: 0 6px 16px rgba(13,148,136,0.22);
      transform: translateY(-2px);
      text-decoration: none; color: var(--primary);
    }
    .link-card-icon { font-size: 24px; flex-shrink: 0; width: 34px; text-align: center; }
    .link-card-text { flex: 1; }
    .link-card-title { font-size: 16px; font-weight: 600; color: var(--primary); display: block; }
    .link-card-sub { font-size: 13px; color: #888; margin-top: 3px; display: block; }
    .link-card-arrow { font-size: 16px; color: var(--accent); flex-shrink: 0; }

    .bd-schedule-card {
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(13,148,136,0.12);
      margin-bottom: 10px;
    }
    .bd-schedule-title {
      padding: 14px 18px;
      font-size: 16px; font-weight: 600;
      color: var(--primary);
      border-bottom: 2px solid var(--accent);
    }
    .bd-day-row {
      display: flex; align-items: center;
      padding: 11px 18px;
      border-bottom: 1px solid #f0f0f0;
      text-decoration: none;
      transition: background 0.15s;
    }
    .bd-day-row:last-child { border-bottom: none; }
    .bd-day-row.has-session { color: var(--primary); }
    .bd-day-row.has-session:hover { background: #f8fffe; }
    .bd-day-row.no-session { color: #ccc; cursor: default; }
    .bd-day-name { font-size: 14px; font-weight: 700; width: 96px; }
    .bd-day-info { flex: 1; font-size: 13px; }
    .bd-day-join { font-size: 12px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  </style>
</head>
<body class="info-page">

  <header class="info-brand-bar">
    <div class="info-brand-name">ThriveHQ</div>
    <div class="info-brand-sub">Body Doubling</div>
  </header>

  <div class="info-content">

    <a href="hosting.html" class="link-card">
      <span class="link-card-icon">🤝</span>
      <span class="link-card-text">
        <span class="link-card-title">Become a Host</span>
        <span class="link-card-sub">Volunteer to run a focus session</span>
      </span>
      <span class="link-card-arrow">→</span>
    </a>

    <div class="bd-schedule-card">
      <div class="bd-schedule-title">Sessions</div>
      <div id="bdSchedule"></div>
    </div>

    <a href="links.html" class="btn btn-navy btn-full" style="margin-top: 24px; padding: 13px 24px;">← Back to Links</a>

    <p class="info-footer">
      Strengths-Based Coaching and Counselling | <a href="https://coach4u.com.au">coach4u.com.au</a>
    </p>

  </div>

  <script>
    (async function() {
      var DAYS = [
        { name: 'Monday',    order: 1 },
        { name: 'Tuesday',   order: 2 },
        { name: 'Wednesday', order: 3 },
        { name: 'Thursday',  order: 4 },
        { name: 'Friday',    order: 5 },
        { name: 'Saturday',  order: 6 }
      ];

      var container = document.getElementById('bdSchedule');
      var SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
      var ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';

      var sessions = [];
      try {
        var res = await fetch(
          SUPABASE_URL + '/rest/v1/body_doubling_sessions?active=eq.true&select=host_name,day_of_week,day_order,start_time,end_time,meeting_url',
          { headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY } }
        );
        var data = await res.json();
        if (res.ok && Array.isArray(data)) sessions = data;
      } catch(e) {}

      container.innerHTML = DAYS.map(function(day) {
        var matches = sessions.filter(function(s) { return s.day_of_week === day.name; });
        if (matches.length > 0) {
          return matches.map(function(s) {
            return '<a href="' + s.meeting_url + '" target="_blank" rel="noopener" class="bd-day-row has-session">' +
              '<span class="bd-day-name">' + day.name + '</span>' +
              '<span class="bd-day-info">' + s.host_name + ' · ' + s.start_time + '–' + s.end_time + ' AEST</span>' +
              '<span class="bd-day-join">Click here to join →</span>' +
            '</a>';
          }).join('');
        } else {
          return '<div class="bd-day-row no-session">' +
            '<span class="bd-day-name">' + day.name + '</span>' +
            '<span class="bd-day-info">No session</span>' +
          '</div>';
        }
      }).join('');
    })();
  </script>

</body>
</html>
