<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B3664">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="header-title">ThriveHQ</span>
      </div>
      <span class="header-version" id="headerVersion"></span>
      <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
    </div>
  </header>
  <main class="main-content">
    <div id="loading" class="loading">Loading your dashboard...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="content" style="display:none;">
      <section class="welcome-section">
        <h2 class="welcome-heading">Welcome back</h2>
        <div class="membership-card">
          <div class="membership-status">Active Member</div>
          <div class="membership-expires">Membership expires: <span id="expiryDate">—</span></div>
        </div>
      </section>
      <section class="brain-pulse-section">
        <h3 class="section-title">Your Brain Pulse Results</h3>
        <div class="pulse-grid" id="pulseGrid"></div>
      </section>
      <section class="session-section">
        <h3 class="section-title">Upcoming Sessions</h3>
        <div class="session-card">
          <div class="session-day">Tuesday</div>
          <div class="session-time">6:00 PM AEST</div>
          <div class="session-type">Coaching Session</div>
        </div>
        <div class="session-card">
          <div class="session-day">Thursday</div>
          <div class="session-time">12:00 PM AEST</div>
          <div class="session-type">Body Doubling</div>
        </div>
      </section>
      <section class="quick-links-section">
        <h3 class="section-title">Quick Links</h3>
        <div class="links-grid">
          <a href="resources.html" class="quick-link"><span class="link-icon">📚</span><span class="link-text">Resources</span><span class="link-arrow">→</span></a>
          <a href="account.html" class="quick-link"><span class="link-icon">⚙️</span><span class="link-text">Account</span><span class="link-arrow">→</span></a>
        </div>
      </section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const PULSE_SECTIONS = {
      capacity:  { name: 'Capacity',  icon: 'C', description: 'The steadiness and resilience of your nervous system' },
      wellbeing: { name: 'Wellbeing', icon: 'W', description: 'What gives your life meaning and sustains you' },
      strengths: { name: 'Strengths', icon: 'S', description: 'How you talk to yourself and trust yourself' },
      execution: { name: 'Execution', icon: 'E', description: 'How you manage everyday brain tasks' }
    };

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = msg;
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-AU', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function signOut() { await sb.auth.signOut(); window.location.href = 'index.html'; }

    function renderPulseCards(assessment) {
      const grid = document.getElementById('pulseGrid');
      grid.innerHTML = '';
      const scores = {
        capacity:  assessment?.capacity_score  || 0,
        wellbeing: assessment?.wellbeing_score || 0,
        strengths: assessment?.strengths_score || 0,
        execution: assessment?.execution_score || 0
      };
      Object.entries(PULSE_SECTIONS).forEach(([key, section]) => {
        const card = document.createElement('div');
        card.className = 'pulse-card';
        card.onclick = () => window.location.href = 'brain-pulse-detail.html?section=' + key;
        card.innerHTML = `
          <div class="pulse-header">
            <div class="pulse-icon ${key}">${section.icon}</div>
            <div class="pulse-title">${section.name}</div>
          </div>
          <div class="pulse-score">${scores[key]}<span style="font-size:16px;">/50</span></div>
          <div class="pulse-description">${section.description}</div>`;
        grid.appendChild(card);
      });
    }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const { data: { user }, error: authErr } = await sb.auth.getUser();
        if (authErr || !user) { window.location.href = 'index.html'; return; }

        const { data: userData } = await sb.from('users').select('*').eq('id', user.id).single();
        if (userData?.membership_status !== 'active') {
          showError('Your membership has expired. Contact support@coach4u.com.au to renew.');
          return;
        }

        const { data: assessments } = await sb
          .from('brain_pulse_assessments').select('*')
          .eq('user_id', user.id).order('assessment_date', { ascending: false }).limit(1);

        if (userData?.membership_end_date)
          document.getElementById('expiryDate').textContent = formatDate(userData.membership_end_date);

        renderPulseCards(assessments?.[0] || null);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (err) {
        showError('Error loading dashboard. Please refresh.');
      }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

    document.getElementById('headerVersion').textContent = 'v1.3 — ' + new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  </script>
</body>
</html>
