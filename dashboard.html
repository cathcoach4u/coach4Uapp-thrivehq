<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1 class="brand-name">ThriveHQ</h1>
        <button class="sign-out-btn" onclick="window.signOut()">Sign Out</button>
      </div>
    </div>
  </header>
  <main class="main-content">
    <div id="loading" class="loading">Loading your dashboard...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="content" style="display:none;">
      <section class="welcome-section">
        <h2 class="welcome-heading">Welcome back</h2>
        <div id="membershipCard" class="membership-card">
          <div class="membership-status">Active Member</div>
          <div class="membership-expires">Membership expires: <span id="expiryDate">—</span></div>
        </div>
      </section>
      <section class="brain-pulse-section">
        <h3 class="section-title">Your Brain Pulse Results</h3>
        <div class="pulse-grid" id="pulseGrid"></div>
      </section>
      <section class="session-section">
        <h3 class="section-title">Upcoming Sessions</h3>
        <div class="session-card">
          <div class="session-day">Tuesday</div>
          <div class="session-time">6:00 PM AEST</div>
          <div class="session-type">Coaching Session</div>
        </div>
        <div class="session-card">
          <div class="session-day">Thursday</div>
          <div class="session-time">12:00 PM AEST</div>
          <div class="session-type">Body Doubling</div>
        </div>
      </section>
      <section class="quick-links-section">
        <h3 class="section-title">Quick Links</h3>
        <div class="links-grid">
          <a href="resources.html" class="quick-link"><span class="link-icon">📚</span><span class="link-text">Resources</span><span class="link-arrow">→</span></a>
          <a href="account.html" class="quick-link"><span class="link-icon">⚙️</span><span class="link-text">Account</span><span class="link-arrow">→</span></a>
        </div>
      </section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    window.addEventListener('DOMContentLoaded', async () => {
      const user = await getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }
      const sb = window.getSupabase();
      const { data: ud } = await sb.from('users').select('membership_status').eq('id', user.id).single();
      if (ud?.membership_status !== 'active') {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Your membership has expired. Contact support to renew.';
        return;
      }
      try { await initDashboard(); } catch(e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading dashboard. Please refresh.';
      }
    });
  </script>
</body>
</html>
