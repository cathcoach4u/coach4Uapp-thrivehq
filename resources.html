<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Resources</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <a href="dashboard.html" class="back-link">← Back</a>
        <h1 class="brand-name">Resources</h1>
        <button class="sign-out-btn" onclick="window.signOut()">Sign Out</button>
      </div>
    </div>
  </header>
  <main class="main-content">
    <div id="loading" class="loading">Loading resources...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="content" style="display:none;">
      <div class="resources-list" id="resourcesList"></div>
      <div class="empty-state" id="emptyState" style="display:none;"><p>No resources available yet. Check back soon!</p></div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    window.addEventListener('DOMContentLoaded', async () => {
      const user = await getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }
      const sb = window.getSupabase();
      const { data: ud } = await sb.from('users').select('membership_status').eq('id', user.id).single();
      if (ud?.membership_status !== 'active') {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Your membership has expired.';
        return;
      }
      try { await loadResources(); } catch(e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading resources.';
      }
    });
  </script>
</body>
</html>
