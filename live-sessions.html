<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Live Group Sessions</title>
  <meta name="theme-color" content="#003366">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23003366' width='100' height='100'/><text x='50' y='65' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>T</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f0f2f5; }

    .page-hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      padding: 44px 24px 40px;
      text-align: center;
      color: white;
    }
    .hero-logo  { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .hero-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .hero-desc  { font-size: 14px; opacity: 0.88; max-width: 400px; margin: 0 auto; line-height: 1.65; }

    .page-content { max-width: 560px; margin: 0 auto; padding: 28px 20px 60px; }

    .session-block {
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 28px 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(13,148,136,0.1);
    }
    .session-block-header { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
    .session-icon { font-size: 36px; flex-shrink: 0; }
    .session-day { font-size: 20px; font-weight: 800; color: var(--primary); margin: 0 0 3px; }
    .session-time { font-size: 15px; font-weight: 600; color: var(--accent); }

    .bonus-badge {
      display: inline-block;
      background: rgba(13,148,136,0.1);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .page-footer { text-align: center; font-size: 13px; color: #999; margin-top: 36px; }
    .page-footer a { color: #999; }
  </style>
</head>
<body>

  <div class="page-hero">
    <div class="hero-logo">ThriveHQ</div>
    <div class="hero-title">Live Group Sessions</div>
    <p class="hero-desc">Join Cath live each week for structure, support, and momentum.</p>
  </div>

  <div class="page-content">

    <p class="section-title">Coaching Session</p>

    <div class="session-block">
      <div class="session-block-header">
        <span class="session-icon">📋</span>
        <div>
          <div class="session-day">Planning Tuesdays</div>
          <div class="session-time">6:00 PM AEST</div>
        </div>
      </div>
    </div>

    <p class="section-title" style="margin-top: 24px;">Body Doubling</p>

    <div class="session-block">
      <div class="session-block-header">
        <span class="session-icon">⚡</span>
        <div>
          <span class="bonus-badge">Bonus Session</span>
          <div class="session-day">Focus Thursdays</div>
          <div class="session-time">12:00 PM AEST</div>
        </div>
      </div>
    </div>

    <a href="links.html" class="btn btn-navy btn-full" style="margin-top: 28px; padding: 13px 24px;">← Back to Links</a>

    <p class="page-footer">
      Strengths-Based Coaching and Counselling | <a href="https://coach4u.com.au">coach4u.com.au</a>
    </p>

  </div>

</body>
</html>
