<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Brain Pulse Detail</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B3664">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="dashboard.html" class="header-back">← Back</a>
        <span class="header-title">Brain Pulse Detail</span>
      </div>
      <span class="header-version" id="headerVersion"></span>
      <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
    </div>
  </header>
  <main class="main-content">
    <div id="loading" class="loading">Loading...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="content" style="display:none;">
      <div class="detail-card" id="detailCard"></div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const PULSE_SECTIONS = {
      capacity:  { name: 'Capacity',  icon: 'C', details: 'How calm you feel, how quickly you recover, and how much energy you have.', focus: ['Notice when your tank is running low and refill before you crash.', 'Use your regulation tools (breathing, movement, connection) early, not only in crisis.', 'Honour the recovery you need. Rest is part of the rhythm, not a reward.'] },
      wellbeing: { name: 'Wellbeing', icon: 'W', details: 'Your sense of purpose, connection, security, health, and belonging.', focus: ['Protect one thing each week that gives your life meaning.', 'Strengthen one relationship that supports you most.', 'Attend to one pillar at a time (purpose, social, financial, physical, community).'] },
      strengths: { name: 'Strengths', icon: 'S', details: 'Your confidence in decisions, self-compassion, and ability to reframe setbacks.', focus: ['Catch the critical inner voice earlier and soften it.', 'Name one thing you did well this week, even if it feels small.', 'Accept how you are built rather than fighting it.'] },
      execution: { name: 'Execution', icon: 'E', details: 'Starting, finishing, pausing, prioritising, and remembering.', focus: ["Start the one task you keep avoiding before the day's energy drops.", 'Use a visible cue to bring you back when you drift off-track.', 'Pair a hard task with a small anchor to make starting easier.'] }
    };

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = msg;
    }

    async function signOut() { await sb.auth.signOut(); window.location.href = 'index.html'; }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const { data: { user }, error: authErr } = await sb.auth.getUser();
        if (authErr || !user) { window.location.href = 'index.html'; return; }

        const { data: ud } = await sb.from('users').select('membership_status').eq('id', user.id).single();
        if (ud?.membership_status !== 'active') { showError('Your membership has expired.'); return; }

        const params = new URLSearchParams(window.location.search);
        const section = params.get('section');
        if (!section || !PULSE_SECTIONS[section]) { window.location.href = 'dashboard.html'; return; }

        const { data: assessments } = await sb
          .from('brain_pulse_assessments').select('*')
          .eq('user_id', user.id).order('assessment_date', { ascending: false }).limit(1);

        const s = PULSE_SECTIONS[section];
        const score = assessments?.[0]?.[section + '_score'] || 0;

        document.getElementById('detailCard').innerHTML = `
          <div class="detail-icon ${section}">${s.icon}</div>
          <h2 class="detail-title">${s.name}</h2>
          <p class="detail-description">${s.details}</p>
          <div class="pulse-score">${score}<span style="font-size:16px;">/50</span></div>
          <div class="coaching-focus">
            <div class="coaching-focus-title">Coaching Focus</div>
            <ul>${s.focus.map(f => '<li>' + f + '</li>').join('')}</ul>
          </div>`;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (err) {
        showError('Error loading details. Please refresh.');
      }
    });

    document.getElementById('headerVersion').textContent = 'v1.3 — ' + new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
  </script>
</body>
</html>
