<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Thrive HQ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Your Thrive HQ">
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f0f4f8;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #003366; }
  </style>
</head>
<body>
  <div>Loading…</div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.1/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
    } else {
      const { data: profile } = await supabase
        .from('users')
        .select('membership_status')
        .eq('id', session.user.id)
        .single();

      if (profile?.membership_status === 'active') {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'inactive.html';
      }
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
