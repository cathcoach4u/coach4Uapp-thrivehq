<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Sign In</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ThriveHQ">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230D9488' width='100' height='100'/><text x='50' y='65' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>T</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #003366 0%, #0D9488 100%); display: flex; flex-direction: row; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-container { background: white; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 32px; color: var(--primary); font-weight: 800; }
    .password-wrapper { position: relative; }
    .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 13px; padding: 4px; }
    .toggle-password:hover { color: var(--accent); }
    .forgot-link { display: block; text-align: right; font-size: 13px; color: var(--accent); text-decoration: none; margin-top: 6px; font-weight: 500; }
    .forgot-link:hover { text-decoration: underline; color: var(--accent-dark); }
    .submit-btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    .submit-btn:hover { background: var(--accent-dark); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .message { margin-top: 16px; padding: 12px 14px; border-radius: 6px; font-size: 14px; display: none; }
    .message.success { background: #D4EDDA; color: #155724; }
    .message.error { background: #F8D7DA; color: #721C24; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>ThriveHQ</h1>
    </div>
    <form id="signInForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePassword()">Show</button>
        </div>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
      <div id="message" class="message"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    let _sb = null;

    function getSupabase() {
      if (!_sb) _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return _sb;
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.style.display = 'block';
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.toggle-password');
      if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
      else { input.type = 'password'; btn.textContent = 'Show'; }
    }

    document.getElementById('signInForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      msg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const sb = getSupabase();
        const { data, error } = await sb.auth.signInWithPassword({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        });
        if (error) throw error;

        const { data: userData } = await sb
          .from('users').select('membership_status').eq('id', data.user.id).single();

        if (userData?.membership_status !== 'active') {
          throw new Error('Your membership has expired. Contact support@coach4u.com.au to renew.');
        }

        window.location.href = 'dashboard.html';
      } catch (err) {
        showMessage(err.message || 'Invalid email or password.', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const sb = getSupabase();
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
          const { data: ud } = await sb.from('users').select('membership_status').eq('id', user.id).single();
          if (ud?.membership_status === 'active') window.location.href = 'dashboard.html';
        }
      } catch (_) {}
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
