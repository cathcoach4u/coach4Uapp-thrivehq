<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Brain Pulse</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="dashboard.html" class="header-back">← Back</a>
        <span class="header-title">Brain Pulse</span>
        <span class="header-version" id="headerVersion"></span>
      </div>
      <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <main class="main-content">
    <div id="loading" class="loading">Loading...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="content" style="display:none;">
      <!-- Brain Pulse content will be built here -->
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.1/+esm';
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const VERSION = '2026-05-05.1';
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = msg;
    }

    window.signOut = async function() { await sb.auth.signOut(); window.location.href = 'index.html'; };

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const { data: { user }, error: authErr } = await sb.auth.getUser();
        if (authErr || !user) { window.location.href = 'index.html'; return; }

        const { data: ud } = await sb.from('users').select('membership_status').eq('id', user.id).single();
        if (ud?.membership_status !== 'active') { window.location.href = 'inactive.html'; return; }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (err) {
        showError('Error loading Brain Pulse. Please refresh.');
      }
    });

    document.getElementById('headerVersion').textContent = 'v' + VERSION;
  </script>
</body>
</html>
