<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Set New Password</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="https://cathcoach4u.github.io/coach4u-shared/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #003366 0%, #0D9488 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .logo { text-align: center; margin-bottom: 8px; }
    .logo h1 { font-size: 32px; color: var(--primary); font-weight: 800; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 6px; margin-top: 24px; }
    .page-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
    .password-wrapper { position: relative; }
    .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 13px; padding: 4px; }
    .toggle-password:hover { color: var(--accent); }
    .submit-btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    .submit-btn:hover { background: var(--accent-dark); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .message { margin-top: 16px; padding: 12px 14px; border-radius: 6px; font-size: 14px; display: none; }
    .message.success { background: #D4EDDA; color: #155724; }
    .message.error { background: #F8D7DA; color: #721C24; }
    #invalidToken { text-align: center; padding: 20px 0; }
    #invalidToken p { color: #721C24; margin-bottom: 16px; }
    .back-link { display: inline-block; font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><h1>ThriveHQ</h1></div>

    <div id="invalidToken" style="display:none;">
      <p>This reset link is invalid or has expired.</p>
      <a href="forgot-password.html" class="back-link">Request a new reset link</a>
    </div>

    <div id="resetForm">
      <p class="page-title">Set new password</p>
      <p class="page-subtitle">Choose a strong password for your account.</p>
      <form id="passwordForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" required placeholder="Min. 8 characters" autocomplete="new-password" minlength="8">
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)">Show</button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" required placeholder="Repeat your password" autocomplete="new-password">
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">Show</button>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Update Password</button>
        <div id="message" class="message"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
      else { input.type = 'password'; btn.textContent = 'Show'; }
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      msg.style.display = 'block';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const { data, error } = await sb.auth.getSession();
      if (error || !data.session) {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('invalidToken').style.display = 'block';
      }
    });

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (pw !== confirm) { showMessage('Passwords do not match.', 'error'); return; }
      if (pw.length < 8) { showMessage('Password must be at least 8 characters.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const { error } = await sb.auth.updateUser({ password: pw });
        if (error) throw error;
        showMessage('Password updated! Redirecting to sign in…', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
      } catch (err) {
        showMessage(err.message || 'Error updating password. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
