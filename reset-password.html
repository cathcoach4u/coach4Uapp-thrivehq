<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThriveHQ — Set New Password</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo"><h1>ThriveHQ</h1></div>

    <div id="invalidToken" style="display:none; text-align:center; padding: 20px 0;">
      <p style="color:#721C24; margin-bottom:16px;">This reset link is invalid or has expired.</p>
      <a href="forgot-password.html" class="login-forgot">Request a new reset link</a>
    </div>

    <div id="resetForm">
      <p class="login-title">Set new password</p>
      <p class="login-subtitle">Choose a strong password for your account.</p>
      <form id="passwordForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" required placeholder="Min. 8 characters" autocomplete="new-password" minlength="8">
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)">Show</button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" required placeholder="Repeat your password" autocomplete="new-password">
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">Show</button>
          </div>
        </div>
        <div id="message" class="login-message"></div>
        <button type="submit" class="login-btn" id="submitBtn">Update Password</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
      else { input.type = 'password'; btn.textContent = 'Show'; }
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'login-message ' + type;
      msg.style.display = 'block';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const { data, error } = await sb.auth.getSession();
      if (error || !data.session) {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('invalidToken').style.display = 'block';
      }
    });

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (pw !== confirm) { showMessage('Passwords do not match.', 'error'); return; }
      if (pw.length < 8) { showMessage('Password must be at least 8 characters.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const { error } = await sb.auth.updateUser({ password: pw });
        if (error) throw error;
        showMessage('Password updated! Redirecting to sign in…', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
      } catch (err) {
        showMessage(err.message || 'Error updating password. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
